name: Deploy to Alibaba Cloud ECS

on:
  push:
    branches: [ main ]   # 改成你的默认分支（master 或 main）

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.ALIYUN_HOST }}
          username: ${{ secrets.ALIYUN_USERNAME }}
          key: ${{ secrets.ALIYUN_SSH_KEY }}
          script: |
            # 进入你的项目目录（修改为实际路径）
            cd /Resume-submission-record
            
            # 拉取最新代码
            git pull origin main
            
            # 安装依赖（如有变化）
            npm install
            
            # 构建项目
            npm run build
            
            # 重启 PM2 应用（修改为你的 PM2 应用名）
            pm2 restart serve --name "resume-app" -- -s dist -l 3000
            